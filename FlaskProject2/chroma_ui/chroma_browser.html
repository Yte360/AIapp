<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chroma 数据可视化管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f7f7f9; }
    .sidebar { height: calc(100vh - 56px); overflow-y: auto; border-right: 1px solid #e5e7eb; background: #fff; }
    .collection-item { cursor: pointer; padding: 10px 12px; border-radius: 6px; }
    .collection-item:hover { background: #f3f4f6; }
    .collection-item.active { background: #e5e7eb; font-weight: 600; }
    .doc-card { border: 1px solid #e5e7eb; border-radius: 10px; background: #fff; }
    .doc-card .head { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; }
    .doc-card .body { padding: 12px; }
    pre { background: #0b1020; color: #e5e7eb; padding: 12px; border-radius: 10px; max-height: 360px; overflow: auto; }
    .muted { color: #6b7280; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">Chroma 数据可视化管理</span>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-light btn-sm" onclick="reloadAll()">刷新</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <div class="col-12 col-md-3 col-lg-2 p-0 sidebar">
        <div class="p-3">
          <div class="d-flex align-items-center justify-content-between mb-2">
            <div class="fw-bold">集合（Collections）</div>
            <span class="badge text-bg-secondary" id="collectionsCount">0</span>
          </div>
          <div id="collections" class="d-grid gap-1"></div>
          <div id="collectionsError" class="alert alert-danger mt-3 d-none"></div>
        </div>
      </div>

      <div class="col-12 col-md-9 col-lg-10 p-3">
        <div class="d-flex flex-wrap align-items-end justify-content-between gap-2">
          <div>
            <div class="h4 mb-1">当前集合：<span id="currentCollection" class="text-primary">（未选择）</span></div>
            <div class="muted" id="currentCollectionMeta"></div>
          </div>

          <div class="d-flex flex-wrap gap-2">
            <div class="input-group" style="width: 320px;">
              <span class="input-group-text">新集合</span>
              <input class="form-control" id="newCollectionName" placeholder="例如: knowledge_base" />
              <button class="btn btn-success" onclick="createCollection()">创建</button>
            </div>

            <button class="btn btn-outline-danger" onclick="deleteCurrentCollection()">删除当前集合</button>

            <div class="input-group" style="width: 220px;">
              <span class="input-group-text">user_id</span>
              <input class="form-control" id="userIdFilter" placeholder="例如 10001" />
              <button class="btn btn-outline-secondary" onclick="applyUserIdFilter()">筛选</button>
              <button class="btn btn-outline-secondary" onclick="clearUserIdFilter()">清除</button>
            </div>

            <div class="input-group" style="width: min(520px, 100%);">
              <span class="input-group-text">搜索</span>
              <input class="form-control" id="searchInput" placeholder="按文本搜索（向量检索方式）" />
              <button class="btn btn-primary" onclick="searchDocs()">查询</button>
              <button class="btn btn-outline-secondary" onclick="clearSearch()">清除</button>
            </div>
            <div class="input-group" style="width: 220px;">
              <span class="input-group-text">每页</span>
              <select class="form-select" id="pageSize" onchange="changePageSize()">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
              </select>
            </div>
          </div>
        </div>

        <div class="card mt-3">
          <div class="card-body">
            <div class="fw-bold mb-2">文档管理（新增/更新/删除）</div>
            <div class="row g-2">
              <div class="col-12 col-md-3">
                <input class="form-control" id="docId" placeholder="ID（留空则自动生成）" />
              </div>
              <div class="col-12 col-md-5">
                <input class="form-control" id="docText" placeholder="文档内容（documents）" />
              </div>
              <div class="col-12 col-md-4">
                <input class="form-control" id="docMeta" placeholder='元数据 JSON（可选）例如: {"title":"xx"}' />
              </div>
            </div>

            <div class="d-flex flex-wrap gap-2 mt-2">
              <button class="btn btn-success btn-sm" onclick="upsertDoc()">新增/更新（Upsert）</button>
              <button class="btn btn-outline-danger btn-sm" onclick="deleteDocById()">按 ID 删除</button>
            </div>
            <div class="muted small mt-2">提示：Upsert 会“有则更新、无则新增”。删除与集合操作均不可恢复，请谨慎。</div>
          </div>
        </div>

        <hr />

        <div class="d-flex align-items-center justify-content-between mb-2">
          <div class="muted">总条目：<span id="totalItems">0</span></div>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm" onclick="prevPage()">上一页</button>
            <div class="muted align-self-center">第 <span id="pageIndex">1</span> 页</div>
            <button class="btn btn-outline-secondary btn-sm" onclick="nextPage()">下一页</button>
          </div>
        </div>

        <div id="docs" class="d-grid gap-2"></div>
        <div id="docsEmpty" class="alert alert-secondary d-none">暂无数据</div>
        <div id="docsError" class="alert alert-danger d-none"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let state = {
      collection: null,
      page: 1,
      pageSize: 20,
      query: "",
      userId: "", // 新增 userId 状态
      total: 0,
      lastPageCount: 0,
    };

    function setText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    }

    function show(id, yes) {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.toggle('d-none', !yes);
    }

    async function apiGet(url) {
      const resp = await fetch(url);
      const txt = await resp.text();
      let data = null;
      try { data = txt ? JSON.parse(txt) : null; } catch { data = { raw: txt }; }
      if (!resp.ok) {
        const msg = (data && (data.error || data.message)) ? (data.error || data.message) : `HTTP ${resp.status}`;
        throw new Error(msg);
      }
      return data;
    }

    async function apiJson(url, method, bodyObj) {
      const resp = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: bodyObj ? JSON.stringify(bodyObj) : undefined,
      });
      const txt = await resp.text();
      let data = null;
      try { data = txt ? JSON.parse(txt) : null; } catch { data = { raw: txt }; }
      if (!resp.ok) {
        const msg = (data && (data.error || data.message)) ? (data.error || data.message) : `HTTP ${resp.status}`;
        throw new Error(msg);
      }
      return data;
    }

    async function loadCollections() {
      show('collectionsError', false);
      const box = document.getElementById('collections');
      box.innerHTML = '<div class="muted">加载中...</div>';
      try {
        const data = await apiGet('/api/chroma/collections');
        setText('collectionsCount', data.length);
        box.innerHTML = '';

        if (!data.length) {
          box.innerHTML = '<div class="muted">未发现集合</div>';
          return;
        }

        for (const c of data) {
          const btn = document.createElement('button');
          btn.className = 'btn btn-light text-start collection-item';
          btn.onclick = () => selectCollection(c.name);
          btn.innerHTML = `
            <div class="d-flex justify-content-between align-items-center">
              <div class="text-truncate" title="${c.name}">${c.name}</div>
              <span class="badge text-bg-primary">${c.count ?? 0}</span>
            </div>
          `;
          btn.dataset.collection = c.name;
          box.appendChild(btn);
        }

        if (!state.collection) {
          await selectCollection(data[0].name);
        } else {
          markActiveCollection();
        }
      } catch (e) {
        show('collectionsError', true);
        document.getElementById('collectionsError').textContent = '加载集合失败：' + e.message;
        box.innerHTML = '';
      }
    }

    function markActiveCollection() {
      document.querySelectorAll('[data-collection]').forEach(el => {
        el.classList.toggle('active', el.dataset.collection === state.collection);
      });
    }

    async function selectCollection(name) {
      state.collection = name;
      state.page = 1;
      state.query = '';
      state.userId = ''; // 切换集合时清空筛选
      document.getElementById('searchInput').value = '';
      document.getElementById('userIdFilter').value = '';
      setText('currentCollection', name);
      setText('currentCollectionMeta', '');
      markActiveCollection();
      await loadDocs();
    }

    async function loadDocs() {
      show('docsError', false);
      show('docsEmpty', false);
      const box = document.getElementById('docs');
      box.innerHTML = '<div class="muted">加载中...</div>';

      if (!state.collection) {
        box.innerHTML = '';
        show('docsEmpty', true);
        return;
      }

      try {
        const offset = (state.page - 1) * state.pageSize;
        const params = new URLSearchParams();
        params.set('limit', String(state.pageSize));
        params.set('offset', String(offset));
        if (state.query) params.set('query', state.query);
        if (state.userId) params.set('user_id', state.userId);

        const data = await apiGet(`/api/chroma/collections/${encodeURIComponent(state.collection)}/documents?` + params.toString());

        state.total = data.total ?? 0;
        state.lastPageCount = (data.documents || []).length;
        setText('totalItems', state.total);
        setText('pageIndex', state.page);

        box.innerHTML = '';
        if (!data.documents || !data.documents.length) {
          show('docsEmpty', true);
          return;
        }

        data.documents.forEach((d, idx) => {
          const wrap = document.createElement('div');
          wrap.className = 'doc-card';

          const meta = d.metadata || {};
          const title = meta.title || meta.file_path || d.id || ('#' + (idx + 1));
          const added = meta.added_time || '';
          const category = meta.category || '';
          const userId = meta.user_id || '';
          const filePath = meta.file_path || '';
          const chunk = (meta.chunk_index !== undefined) ? `${meta.chunk_index}/${meta.total_chunks ?? '?'}` : '';

          const content = d.content || '';
          const preview = content.length > 400 ? content.slice(0, 400) + '…' : content;

          // 核心元数据表格化显示
          const metaRows = [
            { label: '用户 ID', val: userId, badge: 'text-bg-info' },
            { label: '标题', val: meta.title },
            { label: '分类', val: category },
            { label: '文件路径', val: filePath },
            { label: '分块进度', val: chunk },
            { label: '入库时间', val: added }
          ].filter(r => r.val !== undefined && r.val !== '').map(r => `
            <tr>
              <td class="muted small fw-bold" style="width: 80px;">${r.label}</td>
              <td class="small text-break">${r.badge ? `<span class="badge ${r.badge}">${escapeHtml(r.val)}</span>` : escapeHtml(r.val)}</td>
            </tr>
          `).join('');

          wrap.innerHTML = `
            <div class="head d-flex justify-content-between align-items-start gap-2">
              <div class="w-100">
                <div class="d-flex align-items-center gap-2 mb-1">
                  ${userId ? `<span class="badge text-bg-info">用户 ID: ${escapeHtml(userId)}</span>` : '<span class="badge text-bg-warning">无用户归属</span>'}
                <div class="fw-semibold text-truncate" title="${escapeHtml(title)}">${escapeHtml(title)}</div>
                </div>
              </div>
              <button class="btn btn-outline-primary btn-sm" type="button">查看详情</button>
            </div>
            <div class="body">
              <div class="small muted mb-2">ID：${escapeHtml(d.id || '')}</div>
              
              <div class="row">
                <div class="col-12 col-lg-8 mb-3 mb-lg-0">
                  <div class="mb-2 p-2 border rounded bg-light" style="white-space: pre-wrap;">${escapeHtml(preview)}</div>
                </div>
                <div class="col-12 col-lg-4">
                  <table class="table table-sm table-bordered mb-0">
                    <tbody>${metaRows}</tbody>
                  </table>
                </div>
              </div>

              <details class="mt-2">
                <summary class="muted small" style="cursor: pointer;">查看完整元数据 JSON</summary>
                <pre class="mt-1 small">${escapeHtml(JSON.stringify(meta, null, 2))}</pre>
              </details>
            </div>
          `;

          wrap.querySelector('button').onclick = () => {
            alert('完整内容：\n\n' + content);
          };

          box.appendChild(wrap);
        });
      } catch (e) {
        show('docsError', true);
        document.getElementById('docsError').textContent = '加载数据失败：' + e.message;
        box.innerHTML = '';
      }
    }

    function applyUserIdFilter() {
      state.userId = document.getElementById('userIdFilter').value.trim();
      state.page = 1;
      loadDocs();
    }

    function clearUserIdFilter() {
      document.getElementById('userIdFilter').value = '';
      state.userId = '';
      state.page = 1;
      loadDocs();
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function reloadAll() {
      loadCollections();
      if (state.collection) loadDocs();
    }

    async function createCollection() {
      const name = (document.getElementById('newCollectionName').value || '').trim();
      if (!name) {
        alert('请输入集合名称');
        return;
      }
      try {
        await apiJson('/api/chroma/collections', 'POST', { name });
        document.getElementById('newCollectionName').value = '';
        await loadCollections();
        await selectCollection(name);
      } catch (e) {
        alert('创建集合失败：' + e.message);
      }
    }

    async function deleteCurrentCollection() {
      if (!state.collection) {
        alert('请先选择集合');
        return;
      }
      const name = state.collection;
      if (!confirm(`确定要删除集合 "${name}" 吗？该操作不可恢复！`)) return;
      try {
        await apiJson(`/api/chroma/collections/${encodeURIComponent(name)}`, 'DELETE');
        state.collection = null;
        setText('currentCollection', '（未选择）');
        document.getElementById('docs').innerHTML = '';
        setText('totalItems', '0');
        await loadCollections();
      } catch (e) {
        alert('删除集合失败：' + e.message);
      }
    }

    function _genId() {
      return 'ui_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
    }

    async function upsertDoc() {
      if (!state.collection) {
        alert('请先选择集合');
        return;
      }
      const idInput = (document.getElementById('docId').value || '').trim();
      const id = idInput || _genId();
      const text = (document.getElementById('docText').value || '').trim();
      const metaText = (document.getElementById('docMeta').value || '').trim();
      if (!text) {
        alert('请输入文档内容');
        return;
      }

      let meta = null;
      if (metaText) {
        try {
          meta = JSON.parse(metaText);
        } catch (e) {
          alert('元数据 JSON 格式错误：' + e.message);
          return;
        }
      }

      try {
        await apiJson(`/api/chroma/collections/${encodeURIComponent(state.collection)}/documents`, 'POST', {
          ids: [id],
          documents: [text],
          metadatas: meta ? [meta] : null,
        });
        document.getElementById('docId').value = id;
        await loadCollections();
        await loadDocs();
        alert('已新增/更新');
      } catch (e) {
        alert('新增/更新失败：' + e.message);
      }
    }

    async function deleteDocById() {
      if (!state.collection) {
        alert('请先选择集合');
        return;
      }
      const id = (document.getElementById('docId').value || '').trim();
      if (!id) {
        alert('请输入要删除的文档 ID');
        return;
      }
      if (!confirm(`确定要删除文档 ID="${id}" 吗？该操作不可恢复！`)) return;
      try {
        await apiJson(`/api/chroma/collections/${encodeURIComponent(state.collection)}/documents`, 'DELETE', { ids: [id] });
        await loadCollections();
        await loadDocs();
        alert('已删除');
      } catch (e) {
        alert('删除失败：' + e.message);
      }
    }

    function searchDocs() {
      state.query = (document.getElementById('searchInput').value || '').trim();
      state.page = 1;
      loadDocs();
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      state.query = '';
      state.page = 1;
      loadDocs();
    }

    function changePageSize() {
      state.pageSize = parseInt(document.getElementById('pageSize').value, 10) || 20;
      state.page = 1;
      loadDocs();
    }

    function prevPage() {
      if (state.page <= 1) return;
      state.page -= 1;
      loadDocs();
    }

    function nextPage() {
      const maxPage = Math.max(1, Math.ceil(state.total / state.pageSize));
      if (state.page >= maxPage) return;
      state.page += 1;
      loadDocs();
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadCollections();
    });
  </script>
</body>
</html>
